---
# Martin tileserver configuration v1.11.0
# Autodiscovers PMTiles archives from Cloudflare R2 via S3 API.
# Source IDs are derived from R2 object paths relative to the tiles/ prefix.
# Verify discovered IDs at /catalog after startup before updating MapLibre sources.
#
# Required env vars (see docker-compose.yml):
#   R2_ACCOUNT_ID, R2_BUCKET_NAME, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY

listen_addresses: "0.0.0.0:3000"

cache:
  size_mb: 512

# Allow all origins (ArcGIS Pro desktop + local MapLibre viewer)
cors: true

# Warn on missing files instead of aborting startup
on_invalid: warn

convert_to_mlt: auto

styles:
  rendering: true
  sources:
    ciesin_qgis_style: /styles/style-qgis.json


# fonts:
#   - /fonts

sprites:
  paths:
    - /sprites/maki
    - /sprites/temaki
    - /sprites/OSM
    - /sprites/OSM-2020
    - /sprites/OSM-twotone
    - /sprites/OSM-japan


pmtiles:
  # Autodiscover all *.pmtiles under tiles/ in the R2 bucket via S3 ListObjectsV2.
  # Martin polls every 10 minutes and reflects added/changed/removed files live.
  paths:
    - s3://${R2_BUCKET_NAME}/tiles/
  endpoint_url: https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
  access_key_id: ${R2_ACCESS_KEY_ID}
  secret_access_key: ${R2_SECRET_ACCESS_KEY}
  region: auto
  allow_http: false
  convert_to_mvt: auto
  reload_interval: 10m
