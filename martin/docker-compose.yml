services:
  martin:
    image: ghcr.io/maplibre/martin:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./config.yaml:/config.yaml:ro
      - ./data:/data:ro
    command: ["--config", "/config.yaml"]
    environment:
      RUST_LOG: "martin=info,actix_web=warn"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
